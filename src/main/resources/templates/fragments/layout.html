<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title th:text="${pageTitle} + ' – Pensionat'">Pensionat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<nav class="bk-nav" th:fragment="navbar">
    <div class="container d-flex align-items-center justify-content-between">
        <a class="brand" th:href="@{/}">Pensionat</a>
        <div class="d-flex gap-1 flex-wrap">
            <a th:href="@{/customers}">Kunder</a>
            <a th:href="@{/rooms}">Rum</a>
            <a th:href="@{/bookings}">Bokningar</a>
            <a th:href="@{/bookings/search}">Sök lediga rum</a>
        </div>
    </div>
</nav>

<div class="mb-3" th:fragment="alerts">
    <!--/*@thymesVar id="successMessage" type="java.lang.String"*/-->
    <div class="bk-alert-success d-flex justify-content-between align-items-center" th:if="${successMessage}">
        <span th:text="${successMessage}"></span>
        <button class="btn-close btn-sm" onclick="this.parentElement.remove()"></button>
    </div>
    <!--/*@thymesVar id="errorMessage" type="java.lang.String"*/-->
    <div class="bk-alert-danger d-flex justify-content-between align-items-center" th:if="${errorMessage}">
        <span th:text="${errorMessage}"></span>
        <button class="btn-close btn-sm" onclick="this.parentElement.remove()"></button>
    </div>
</div>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>

</html>
