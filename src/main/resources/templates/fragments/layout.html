<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sv">

<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' – Pensionat'">Pensionat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<nav th:fragment="navbar" class="bk-nav">
    <div class="container d-flex align-items-center justify-content-between">
        <a th:href="@{/}" class="brand">Pensionat</a>
        <div class="d-flex gap-1 flex-wrap">
            <a th:href="@{/customers}">Kunder</a>
            <a th:href="@{/rooms}">Rum</a>
            <a th:href="@{/bookings}">Bokningar</a>
            <a th:href="@{/bookings/search}">Sök lediga rum</a>
        </div>
    </div>
</nav>

<div th:fragment="alerts" class="mb-3">
    <!--/*@thymesVar id="successMessage" type="java.lang.String"*/-->
    <div th:if="${successMessage}" class="bk-alert-success d-flex justify-content-between align-items-center">
        <span th:text="${successMessage}"></span>
        <button class="btn-close btn-sm" onclick="this.parentElement.remove()"></button>
    </div>
    <!--/*@thymesVar id="errorMessage" type="java.lang.String"*/-->
    <div th:if="${errorMessage}" class="bk-alert-danger d-flex justify-content-between align-items-center">
        <span th:text="${errorMessage}"></span>
        <button class="btn-close btn-sm" onclick="this.parentElement.remove()"></button>
    </div>
</div>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>

</html>
