<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"><title>Pensionat</title></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="bk-page-bar">
    <div class="container">
        <h2 th:text="${pageTitle}">Rum</h2>
    </div>
</div>

<main class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="bk-card">
                <div class="bk-card-header" th:text="${pageTitle}">Rum</div>
                <div class="p-4">
                    <form method="post"
                          th:action="@{${room.id == null ? '/rooms' : '/rooms/' + room.id}}"
                          th:object="${room}">

                        <div class="mb-3">
                            <label class="bk-label">Rumsnummer <span class="text-danger">*</span></label>
                            <label>
                                <input class="form-control bk-input" placeholder="t.ex. 101" th:classappend="${#fields.hasErrors('roomNumber')} ? 'is-invalid'"
                                       th:field="*{roomNumber}"
                                       type="text">
                            </label>
                            <div class="invalid-feedback" th:errors="*{roomNumber}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="bk-label">Rumstyp <span class="text-danger">*</span></label>
                            <label>
                                <select class="form-select bk-input" onchange="toggleExtraBeds(this.value)"
                                        th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'"
                                        th:field="*{type}">
                                    <option value="">– Välj typ –</option>
                                    <option th:each="t : ${roomTypes}"
                                            th:text="${t.displayName}"
                                            th:value="${t.name()}"></option>
                                </select>
                            </label>
                            <div class="invalid-feedback" th:errors="*{type}"></div>
                        </div>

                        <div class="mb-3" id="extraBedsGroup">
                            <label class="bk-label">Extrasängar <span class="text-muted fw-normal">(0–2, ej tillämpligt för enkelrum)</span></label>
                            <label>
                                <select class="form-select bk-input" th:field="*{extraBeds}">
                                    <option value="0">0 – inga extrasängar</option>
                                    <option value="1">1 extrasäng</option>
                                    <option value="2">2 extrasängar</option>
                                </select>
                            </label>
                        </div>

                        <div class="mb-4">
                            <label class="bk-label">Pris per natt (kr) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <label>
                                    <input class="form-control bk-input" min="1" placeholder="800"
                                           step="1"
                                           th:classappend="${#fields.hasErrors('pricePerNight')} ? 'is-invalid'" th:field="*{pricePerNight}" type="number">
                                </label>
                                <span class="input-group-text">kr</span>
                                <div class="invalid-feedback" th:errors="*{pricePerNight}"></div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-bk px-4" type="submit">Spara</button>
                            <a class="btn btn-outline-secondary" th:href="@{/rooms}">Avbryt</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    function toggleExtraBeds(type) {
        const g = document.getElementById('extraBedsGroup');
        if (type === 'SINGLE') {
            g.style.display = 'none';
            g.querySelector('select').value = '0';
        } else {
            g.style.display = '';
        }
    }

    const sel = document.querySelector('[name="type"]');
    if (sel) {
        toggleExtraBeds(sel.value);
        sel.addEventListener('change', e => toggleExtraBeds(e.target.value));
    }
</script>
</body>
</html>
