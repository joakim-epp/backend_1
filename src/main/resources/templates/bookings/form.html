<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"><title>Pensionat</title></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="bk-page-bar">
    <div class="container">
        <h2 th:text="${pageTitle}">Bokning</h2>
    </div>
</div>

<main class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="bk-card">
                <div class="bk-card-header" th:text="${pageTitle}">Bokning</div>
                <div class="p-4">

                    <div class="bk-alert-danger mb-3" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form method="post"
                          th:action="@{${bookingId == null ? '/bookings' : '/bookings/' + bookingId}}">

                        <div class="mb-3">
                            <label class="bk-label">Kund <span class="text-danger">*</span></label>
                            <label>
                                <select class="form-select bk-input" name="customerId" required>
                                    <option value="">– Välj kund –</option>
                                    <option th:each="c : ${customers}"
                                            th:selected="${c.id == selectedCustomerId}"
                                            th:text="${c.fullName + (c.phone != null and !c.phone.isEmpty() ? ' · ' + c.phone : '')}"
                                            th:value="${c.id}"></option>
                                </select>
                            </label>
                        </div>

                        <div class="mb-3">
                            <label class="bk-label">Rum <span class="text-danger">*</span></label>
                            <label>
                                <select class="form-select bk-input" name="roomId" required>
                                    <option value="">– Välj rum –</option>
                                    <option th:each="r : ${rooms}"
                                            th:selected="${r.id == selectedRoomId}"
                                            th:text="${'Rum ' + r.roomNumber + ' – ' + r.typeDescription + ' – ' + #numbers.formatDecimal(r.pricePerNight,1,'COMMA',0,'POINT') + ' kr/natt'}"
                                            th:value="${r.id}"></option>
                                </select>
                            </label>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="bk-label">Incheckning <span class="text-danger">*</span></label>
                                <label>
                                    <input class="form-control bk-input" name="checkIn" required
                                           th:value="${selectedCheckIn}" type="date">
                                </label>
                            </div>
                            <div class="col-6">
                                <label class="bk-label">Utcheckning <span class="text-danger">*</span></label>
                                <label>
                                    <input class="form-control bk-input" name="checkOut" required
                                           th:value="${selectedCheckOut}" type="date">
                                </label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="bk-label">Antal gäster <span class="text-danger">*</span></label>
                            <label>
                                <select class="form-select bk-input" name="numberOfGuests" required>
                                    <option th:each="n : ${#numbers.sequence(1,4)}"
                                            th:selected="${n == selectedGuests}"
                                            th:text="${n + (n == 1 ? ' gäst' : ' gäster')}"
                                            th:value="${n}"></option>
                                </select>
                            </label>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-bk-yellow px-4" type="submit">Spara bokning</button>
                            <a class="btn btn-outline-secondary" th:href="@{/bookings}">Avbryt</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
