<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sv">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"><title>Pensionat</title></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="bk-page-bar">
    <div class="container">
        <h2 th:text="${pageTitle}">Bokning</h2>
    </div>
</div>

<main class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="bk-card">
                <div class="bk-card-header" th:text="${pageTitle}">Bokning</div>
                <div class="p-4">

                    <div th:if="${errorMessage}" class="bk-alert-danger mb-3" th:text="${errorMessage}"></div>

                    <form th:action="@{${bookingId == null ? '/bookings' : '/bookings/' + bookingId}}"
                          method="post">

                        <div class="mb-3">
                            <label class="bk-label">Kund <span class="text-danger">*</span></label>
                            <label>
                                <select name="customerId" class="form-select bk-input" required>
                                    <option value="">– Välj kund –</option>
                                    <option th:each="c : ${customers}"
                                            th:value="${c.id}"
                                            th:text="${c.fullName + (c.phone != null and !c.phone.isEmpty() ? ' · ' + c.phone : '')}"
                                            th:selected="${c.id == selectedCustomerId}"></option>
                                </select>
                            </label>
                        </div>

                        <div class="mb-3">
                            <label class="bk-label">Rum <span class="text-danger">*</span></label>
                            <label>
                                <select name="roomId" class="form-select bk-input" required>
                                    <option value="">– Välj rum –</option>
                                    <option th:each="r : ${rooms}"
                                            th:value="${r.id}"
                                            th:text="${'Rum ' + r.roomNumber + ' – ' + r.typeDescription + ' – ' + #numbers.formatDecimal(r.pricePerNight,1,'COMMA',0,'POINT') + ' kr/natt'}"
                                            th:selected="${r.id == selectedRoomId}"></option>
                                </select>
                            </label>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="bk-label">Incheckning <span class="text-danger">*</span></label>
                                <label>
                                    <input type="date" name="checkIn" class="form-control bk-input"
                                           th:value="${selectedCheckIn}" required>
                                </label>
                            </div>
                            <div class="col-6">
                                <label class="bk-label">Utcheckning <span class="text-danger">*</span></label>
                                <label>
                                    <input type="date" name="checkOut" class="form-control bk-input"
                                           th:value="${selectedCheckOut}" required>
                                </label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="bk-label">Antal gäster <span class="text-danger">*</span></label>
                            <label>
                                <select name="numberOfGuests" class="form-select bk-input" required>
                                    <option th:each="n : ${#numbers.sequence(1,4)}"
                                            th:value="${n}"
                                            th:text="${n + (n == 1 ? ' gäst' : ' gäster')}"
                                            th:selected="${n == selectedGuests}"></option>
                                </select>
                            </label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-bk-yellow px-4">Spara bokning</button>
                            <a th:href="@{/bookings}" class="btn btn-outline-secondary">Avbryt</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
