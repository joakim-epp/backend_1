<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sök lediga rum')}"><title>Pensionat</title></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Search hero -->
<section class="bk-hero">
    <div class="container">
        <h1>Sök lediga rum</h1>
        <p class="mb-4">Ange datum och antal gäster för att se tillgängliga rum</p>
        <form method="post" th:action="@{/bookings/search}" th:object="${searchForm}">
            <div class="bk-search-strip">
                <div>
                    <label>Incheckning</label>
                    <label>
                        <input class="form-control" style="min-width:150px;" th:classappend="${#fields.hasErrors('checkIn')} ? 'is-invalid'"
                               th:field="*{checkIn}"
                               type="date">
                    </label>
                </div>
                <div>
                    <label>Utcheckning</label>
                    <label>
                        <input class="form-control" style="min-width:150px;" th:classappend="${#fields.hasErrors('checkOut')} ? 'is-invalid'"
                               th:field="*{checkOut}"
                               type="date">
                    </label>
                </div>
                <div>
                    <label>Antal gäster</label>
                    <label>
                        <select class="form-select" style="min-width:130px;" th:field="*{numberOfGuests}">
                            <option th:each="n : ${#numbers.sequence(1,4)}"
                                    th:text="${n + (n == 1 ? ' gäst' : ' gäster')}"
                                    th:value="${n}"></option>
                        </select>
                    </label>
                </div>
                <button class="btn-bk-search" type="submit">Sök</button>
            </div>
            <!-- inline validation errors -->
            <div class="mt-2 text-warning small fw-bold"
                 th:if="${#fields.hasErrors('checkIn') or #fields.hasErrors('checkOut') or #fields.hasErrors('numberOfGuests')}">
                <span th:errors="*{checkIn}" th:if="${#fields.hasErrors('checkIn')}"></span>
                <span th:errors="*{checkOut}" th:if="${#fields.hasErrors('checkOut')}"></span>
                <span th:errors="*{numberOfGuests}" th:if="${#fields.hasErrors('numberOfGuests')}"></span>
            </div>
        </form>
    </div>
</section>

<main class="container py-4">

    <!-- No results -->
    <div class="bk-card p-4 text-center text-muted"
         th:if="${availableRooms != null and availableRooms.isEmpty()}">
        <h5 class="mt-2">Inga lediga rum hittades</h5>
        <p class="mb-0">Prova andra datum eller färre gäster.</p>
    </div>

    <!-- Results -->
    <div th:if="${availableRooms != null and !availableRooms.isEmpty()}">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">
                <span th:text="${availableRooms.size()}"></span> lediga rum
                <small class="text-muted fw-normal">
                    &nbsp;·&nbsp;<span th:text="${checkIn}"></span>
                    &nbsp;→&nbsp;<span th:text="${checkOut}"></span>
                    &nbsp;·&nbsp;<span th:text="${numberOfGuests + (numberOfGuests == 1 ? ' gäst' : ' gäster')}"></span>
                </small>
            </h5>
        </div>

        <div class="d-flex flex-column gap-3">
            <div class="room-result-card" th:each="r : ${availableRooms}">

                <!-- Colour placeholder instead of photo -->
                <div class="room-result-img"></div>

                <!-- Info -->
                <div class="flex-grow-1 p-3">
                    <h5 class="mb-1">
                        Rum <span th:text="${r.roomNumber}"></span>
                        <span class="badge ms-1"
                              th:style="${r.type.name() == 'SINGLE'} ? 'background:#ebf3ff;color:var(--bk-dark)' : 'background:#d4edda;color:#155724'"
                              th:text="${r.type.displayName}"></span>
                    </h5>
                    <p class="text-muted small mb-2" th:text="${r.typeDescription}"></p>
                    <div class="d-flex gap-3 small text-muted">
                        <span>Max <strong th:text="${r.capacity}"></strong> pers.</span>
                        <span style="color:#28a745">Tillgängligt</span>
                    </div>
                </div>

                <!-- Price + book -->
                <div class="room-result-price">
                    <div class="text-end">
                        <div class="text-muted small">per natt</div>
                        <div class="fw-bold fs-4" style="color:var(--bk-dark)"
                             th:text="${#numbers.formatDecimal(r.pricePerNight,1,'COMMA',0,'POINT') + ' kr'}"></div>
                    </div>
                    <a class="btn btn-bk-yellow w-100"
                       th:href="@{/bookings/new(roomId=${r.id},checkIn=${checkIn},checkOut=${checkOut},guests=${numberOfGuests})}">Boka nu</a>
                </div>

            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
