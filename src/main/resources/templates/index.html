<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Hem')}"><title>Pensionat</title></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Hero -->
<section class="bk-hero">
    <div class="container">
        <h1>Hitta ditt perfekta rum</h1>
        <p class="mb-4">Boka enkelrum och dubbelrum med möjlighet till extrasängar</p>

        <form method="get" th:action="@{/bookings/search}">
            <div class="bk-search-strip">
                <div>
                    <label>Incheckning</label>
                    <label>
                        <input class="form-control" name="preCheckIn" style="min-width:150px;" type="date">
                    </label>
                </div>
                <div>
                    <label>Utcheckning</label>
                    <label>
                        <input class="form-control" name="preCheckOut" style="min-width:150px;" type="date">
                    </label>
                </div>
                <div>
                    <label>Antal gäster</label>
                    <label>
                        <select class="form-select" name="preGuests" style="min-width:120px;">
                            <option value="1">1 gäst</option>
                            <option value="2">2 gäster</option>
                            <option value="3">3 gäster</option>
                            <option value="4">4 gäster</option>
                        </select>
                    </label>
                </div>
                <button class="btn-bk-search" type="submit">Sök</button>
            </div>
        </form>
    </div>
</section>

<!-- Stats -->
<main class="container py-4">
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-num" th:text="${customerCount}">0</div>
                <div class="text-muted fw-600 mb-3">Registrerade kunder</div>
                <a class="btn btn-bk w-100" th:href="@{/customers}">Hantera kunder</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-num" th:text="${roomCount}">0</div>
                <div class="text-muted mb-3">Tillgängliga rum</div>
                <a class="btn btn-bk w-100" th:href="@{/rooms}">Hantera rum</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-num" th:text="${bookingCount}">0</div>
                <div class="text-muted mb-3">Aktiva bokningar</div>
                <a class="btn btn-bk w-100" th:href="@{/bookings}">Se bokningar</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
