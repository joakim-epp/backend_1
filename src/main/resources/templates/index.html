<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sv">
<head th:replace="~{fragments/layout :: head('Hem')}"><title>Pensionat</title></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Hero -->
<section class="bk-hero">
    <div class="container">
        <h1>Hitta ditt perfekta rum</h1>
        <p class="mb-4">Boka enkelrum och dubbelrum med möjlighet till extrasängar</p>

        <form th:action="@{/bookings/search}" method="get">
            <div class="bk-search-strip">
                <div>
                    <label>Incheckning</label>
                    <input type="date" name="preCheckIn" class="form-control" style="min-width:150px;">
                </div>
                <div>
                    <label>Utcheckning</label>
                    <input type="date" name="preCheckOut" class="form-control" style="min-width:150px;">
                </div>
                <div>
                    <label>Antal gäster</label>
                    <select name="preGuests" class="form-select" style="min-width:120px;">
                        <option value="1">1 gäst</option>
                        <option value="2">2 gäster</option>
                        <option value="3">3 gäster</option>
                        <option value="4">4 gäster</option>
                    </select>
                </div>
                <button type="submit" class="btn-bk-search">Sök</button>
            </div>
        </form>
    </div>
</section>

<!-- Stats -->
<main class="container py-4">
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-num" th:text="${customerCount}">0</div>
                <div class="text-muted fw-600 mb-3">Registrerade kunder</div>
                <a th:href="@{/customers}" class="btn btn-bk w-100">Hantera kunder</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-num" th:text="${roomCount}">0</div>
                <div class="text-muted mb-3">Tillgängliga rum</div>
                <a th:href="@{/rooms}" class="btn btn-bk w-100">Hantera rum</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-num" th:text="${bookingCount}">0</div>
                <div class="text-muted mb-3">Aktiva bokningar</div>
                <a th:href="@{/bookings}" class="btn btn-bk w-100">Se bokningar</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
