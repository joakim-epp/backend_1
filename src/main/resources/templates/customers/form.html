<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sv">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"><title>Pensionat</title></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="bk-page-bar">
    <div class="container">
        <h2 th:text="${pageTitle}">Kund</h2>
    </div>
</div>

<main class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="bk-card">
                <div class="bk-card-header" th:text="${pageTitle}">Kund</div>
                <div class="p-4">
                    <form th:object="${customer}"
                          th:action="@{${customer.id == null ? '/customers' : '/customers/' + customer.id}}"
                          method="post">

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="bk-label">Förnamn <span class="text-danger">*</span></label>
                                <label>
                                    <input type="text" th:field="*{firstName}" class="form-control bk-input"
                                           th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                           placeholder="Anna">
                                </label>
                                <div class="invalid-feedback" th:errors="*{firstName}"></div>
                            </div>
                            <div class="col-6">
                                <label class="bk-label">Efternamn <span class="text-danger">*</span></label>
                                <label>
                                    <input type="text" th:field="*{lastName}" class="form-control bk-input"
                                           th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                           placeholder="Svensson">
                                </label>
                                <div class="invalid-feedback" th:errors="*{lastName}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="bk-label">E-post</label>
                            <label>
                                <input type="email" th:field="*{email}" class="form-control bk-input"
                                       placeholder="anna@exempel.se">
                            </label>
                        </div>

                        <div class="mb-3">
                            <label class="bk-label">Telefon</label>
                            <label>
                                <input type="text" th:field="*{phone}" class="form-control bk-input"
                                       placeholder="070-123 45 67">
                            </label>
                        </div>

                        <div class="mb-4">
                            <label class="bk-label">Adress</label>
                            <label>
                                <input type="text" th:field="*{address}" class="form-control bk-input"
                                       placeholder="Storgatan 1, Stockholm">
                            </label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-bk px-4">Spara</button>
                            <a th:href="@{/customers}" class="btn btn-outline-secondary">Avbryt</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
